conky.config = {
    -- General
    background = false,
    update_interval = 1.0,
    double_buffer = true,

    -- Window settings (GNOME/X11 safe)
    own_window = true,
    own_window_type = 'normal',
    own_window_transparent = true,
    own_window_argb_visual = true,
    own_window_argb_value = 180,
    own_window_hints = 'undecorated,sticky,skip_taskbar,skip_pager',

    -- Placement
    alignment = 'top_right',
    gap_x = 20,
    gap_y = 20,
    minimum_width = 380,

    -- Appearance
    use_xft = true,
    font = 'DejaVu Sans Mono:size=9',
    default_color = 'white',
    draw_borders = false,
};

conky.text = [[
${color grey}CART SYSTEM MONITOR${color}
Host: $nodename   Uptime: $uptime

${color grey}CPU (total)${color}
${goto 0}${cpu}%${goto 60}${cpubar 8}

${color grey}CPU (per logical core)${color}
${goto 0}CPU  0:${goto 55}${cpu cpu0}%${goto 95}${cpubar cpu0 6}
${goto 0}CPU  1:${goto 55}${cpu cpu1}%${goto 95}${cpubar cpu1 6}
${goto 0}CPU  2:${goto 55}${cpu cpu2}%${goto 95}${cpubar cpu2 6}
${goto 0}CPU  3:${goto 55}${cpu cpu3}%${goto 95}${cpubar cpu3 6}
${goto 0}CPU  4:${goto 55}${cpu cpu4}%${goto 95}${cpubar cpu4 6}
${goto 0}CPU  5:${goto 55}${cpu cpu5}%${goto 95}${cpubar cpu5 6}
${goto 0}CPU  6:${goto 55}${cpu cpu6}%${goto 95}${cpubar cpu6 6}
${goto 0}CPU  7:${goto 55}${cpu cpu7}%${goto 95}${cpubar cpu7 6}
${goto 0}CPU  8:${goto 55}${cpu cpu8}%${goto 95}${cpubar cpu8 6}
${goto 0}CPU  9:${goto 55}${cpu cpu9}%${goto 95}${cpubar cpu9 6}
${goto 0}CPU 10:${goto 55}${cpu cpu10}%${goto 95}${cpubar cpu10 6}
${goto 0}CPU 11:${goto 55}${cpu cpu11}%${goto 95}${cpubar cpu11 6}
${goto 0}CPU 12:${goto 55}${cpu cpu12}%${goto 95}${cpubar cpu12 6}
${goto 0}CPU 13:${goto 55}${cpu cpu13}%${goto 95}${cpubar cpu13 6}
${goto 0}CPU 14:${goto 55}${cpu cpu14}%${goto 95}${cpubar cpu14 6}
${goto 0}CPU 15:${goto 55}${cpu cpu15}%${goto 95}${cpubar cpu15 6}

${color grey}CPU Temperature${color}
${execi 10 sensors | grep -m 1 'Package id 0' | awk '{print $4}'}

${color grey}Memory${color}
$mem / $memmax ($memperc%) ${membar 8}

${color grey}GPU (NVIDIA)${color}
${execi 5 nvidia-smi --query-gpu=name,utilization.gpu,memory.used,memory.total,temperature.gpu --format=csv,noheader,nounits | awk -F',' '{gsub(/^ +| +$/,"",$1); printf "%s\nUtil: %s%%  Mem: %s/%s MB  Temp: %s°C\n", $1,$2,$3,$4,$5}'}

${color grey}Docker${color}
Containers running: ${execi 10 docker ps -q | wc -l}
]];
